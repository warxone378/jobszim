<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - Jobszim</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .auth-form { max-width:400px; margin:2rem auto; padding:2rem; background:white; border-radius:8px; }
        .form-group { margin-bottom:1rem; }
        input { width:100%; padding:0.8rem; border:1px solid #ddd; border-radius:4px; }
        button { width:100%; padding:1rem; background:var(--primary); color:white; border:none; border-radius:4px; cursor:pointer; }
    </style>
</head>
<body>
    <header><h1>Jobszim</h1><nav><a href="/">Home</a></nav></header>
    <main>
        <div class="auth-form">
            <h2>Reset Password</h2>
            <form id="resetForm">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit">Reset Password</button>
            </form>
            <div id="message"></div>
        </div>
    </main>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('message');
            const res = await fetch('/password/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, password })
            });
            const data = await res.json();
            if (data.error) msgDiv.innerHTML = `<p style="color:red">${data.error}</p>`;
            else msgDiv.innerHTML = `<p style="color:green">${data.message}. <a href="/login.html">Login</a></p>`;
        });
    </script>
    <script src="https://pl28814336.effectivegatecpm.com/d5/38/04/d53804697acdee420d6b6655ac81bf49.js"></script>
</body>
</html>
