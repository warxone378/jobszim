<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Register - Jobszim</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        .auth-form { max-width:400px; margin:2rem auto; padding:2rem; background:white; border-radius:8px; }
        .form-group { margin-bottom:1rem; }
        label { display:block; font-weight:bold; margin-bottom:0.5rem; }
        input { width:100%; padding:0.8rem; border:1px solid #ddd; border-radius:4px; }
        button { width:100%; padding:1rem; background:var(--primary); color:white; border:none; border-radius:4px; cursor:pointer; }
        .g-recaptcha { margin:1rem 0; }
        .error { color:red; margin-top:1rem; }
        .success { color:green; margin-top:1rem; }
    </style>
</head>
    <script>
  atOptions = {
    'key' : 'd27e15173bfd83b01aeb30f069fb5739',
    'format' : 'iframe',
    'height' : 600,
    'width' : 160,
    'params' : {}
  };
</script>
<script src="https://www.highperformanceformat.com/d27e15173bfd83b01aeb30f069fb5739/invoke.js"></script>
<body>
    <header><h1>Jobszim</h1><nav><a href="/">Home</a></nav></header>
    <main>
        <div class="auth-form">
            <h2>Register</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group">
                    <label>Registration Key</label>
                    <input type="text" id="key" required>
                </div>
                <div class="g-recaptcha" data-sitekey="your-site-key-here"></div>
                <button type="submit">Register</button>
                <p class="error" id="errorMsg"></p>
                <p class="success" id="successMsg"></p>
            </form>
            <p>Already have an account? <a href="/login.html">Login here</a>.</p>
        </div>
    </main>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = grecaptcha.getResponse();
            if (!token) {
                alert('Please complete the captcha');
                return;
            }
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const key = document.getElementById('key').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            errorMsg.textContent = '';
            successMsg.textContent = '';
            try {
                const res = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, key, recaptcha_token: token })
                });
                const data = await res.json();
                if (data.error) {
                    errorMsg.textContent = data.error;
                    grecaptcha.reset();
                } else {
                    successMsg.textContent = 'Registration successful! Redirecting...';
                    setTimeout(() => { window.location.href = '/login.html'; }, 2000);
                }
            } catch (err) {
                errorMsg.textContent = 'An error occurred.';
                grecaptcha.reset();
            }
        });
    </script>
    <script src="https://pl28814336.effectivegatecpm.com/d5/38/04/d53804697acdee420d6b6655ac81bf49.js"></script>
</body>
</html>
