<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Login - Jobszim</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header><h1>Jobszim</h1><nav><a href="/">Home</a></nav></header>
    <main>
        <div class="auth-form">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit">Login</button>
                <p class="error" id="errorMsg"></p>
            </form>
            <p><a href="/forgot-password.html">Forgot password?</a></p>
            <p>Don't have an account? <a href="/register.html">Register here</a>.</p>
        </div>
    </main>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = '';
            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.error) {
                    errorMsg.textContent = data.error;
                } else {
                    window.location.href = '/';
                }
            } catch (err) {
                errorMsg.textContent = 'An error occurred.';
            }
        });
    </script>
    <script src="https://pl28814336.effectivegatecpm.com/d5/38/04/d53804697acdee420d6b6655ac81bf49.js"></script>
</body>
</html>
