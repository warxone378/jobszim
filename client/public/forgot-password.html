<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - Jobszim</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .auth-form { max-width:400px; margin:2rem auto; padding:2rem; background:white; border-radius:8px; }
        .form-group { margin-bottom:1rem; }
        input { width:100%; padding:0.8rem; border:1px solid #ddd; border-radius:4px; }
        button { width:100%; padding:1rem; background:var(--primary); color:white; border:none; border-radius:4px; cursor:pointer; }
    </style>
</head>
<body>
    <header><h1>Jobszim</h1><nav><a href="/">Home</a></nav></header>
    <main>
        <div class="auth-form">
            <h2>Forgot Password</h2>
            <form id="forgotForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <button type="submit">Send Reset Link</button>
            </form>
            <div id="message"></div>
        </div>
    </main>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const msgDiv = document.getElementById('message');
            const res = await fetch('/password/forgot', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            msgDiv.innerHTML = `<p>${data.message || data.error}</p>`;
        });
    </script>
</body>
</html>
