<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Alerts - Jobszim</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .alert-form { max-width: 500px; margin: 2rem auto; padding: 2rem; background: white; border-radius: 8px; }
        .alert-item { background: white; padding: 1rem; margin: 1rem 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .active { border-left: 4px solid green; }
        .inactive { border-left: 4px solid gray; opacity: 0.7; }
    </style>
</head>
<body>
    <header>
        <h1>Job Alerts</h1>
        <nav><a href="/">← Back to Jobs</a></nav>
    </header>
    <main>
        <div class="alert-form">
            <h2>Create New Alert</h2>
            <form id="alertForm">
                <div class="form-group">
                    <label>Keyword (e.g., "developer")</label>
                    <input type="text" id="keyword" placeholder="Optional">
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="location" placeholder="e.g., Harare">
                </div>
                <div class="form-group">
                    <label>Frequency</label>
                    <select id="frequency">
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                        <option value="instant">Instant (as soon as posted)</option>
                    </select>
                </div>
                <button type="submit">Create Alert</button>
            </form>
        </div>
        <div id="alerts-list">
            <h2>Your Alerts</h2>
            <p>Loading...</p>
        </div>
    </main>
    <script src="/js/alerts.js"></script>
</body>
</html>
